services:
  - type: web
    name: playpack
    env: python
    region: oregon
    plan: free
    buildCommand: |
      apt-get install -y ffmpeg &&
      pip install -r requirements.txt &&
      cd frontend && npm install && npm run build && cd ..
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
